name: AFSA incoming dispatch

on:
  push:
    branches: [main]
    paths:
      - 'incoming/**'

permissions:
  contents: read
  actions: write

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install inference deps
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision ultralytics opencv-python-headless pillow numpy

      - name: List changed incoming images (and sidecar targets)
        id: chg
        run: |
          python3 .github/scripts/afsa_collect_changed_images.py > /tmp/images.txt
          echo "count=$(grep -c . /tmp/images.txt 2>/dev/null || echo 0)" >> "$GITHUB_OUTPUT"
          echo "--- images to process ---"
          cat /tmp/images.txt

      - name: Resolve routes from sidecar
        if: steps.chg.outputs.count != '0'
        run: python3 .github/scripts/afsa_resolve_sidecar.py /tmp/images.txt

      - name: Run disease models (exports/)
        if: steps.chg.outputs.count != '0'
        run: python3 .github/scripts/afsa_run_disease_models.py /tmp/images.txt

      - name: Upload predictions artifact
        if: steps.chg.outputs.count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: predictions
          path: out/predictions.json
          if-no-files-found: error
